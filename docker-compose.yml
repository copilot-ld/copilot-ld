#
# Volumes
# Note: This file requires Docker BuildKit. Set DOCKER_BUILDKIT=1 or COMPOSE_DOCKER_CLI_BUILD=1
#

volumes:
  minio_data:
    driver: local
  supabase_db_data:
    driver: local
  supabase_storage_data:
    driver: local

secrets:
  github_token:
    environment: GITHUB_TOKEN

#
# Networks
#

networks:
  internal:
    driver: bridge

#
# Services
#

services:
  #
  # Infrastructure Services
  #

  alb:
    build:
      context: ./infrastructure/docker/alb
      dockerfile: Dockerfile
    image: copilot-ld/alb:latest
    container_name: alb.copilot-ld
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./data/cert/localhost.crt:/etc/ssl/certs/localhost.crt:ro
      - ./data/cert/localhost.key:/etc/ssl/private/localhost.key:ro
    networks:
      internal:
        aliases:
          - alb.copilot-ld.local
    depends_on:
      - web

  gateway:
    build:
      context: ./infrastructure/docker/gateway
      dockerfile: Dockerfile
    image: copilot-ld/gateway:latest
    container_name: gateway.copilot-ld
    ports:
      - "3128:3128"
    networks:
      internal:
        aliases:
          - gateway.copilot-ld.local

  storage:
    image: minio/minio:latest
    container_name: storage.copilot-ld
    env_file: .env
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      internal:
        aliases:
          - storage.copilot-ld.local
    command: server /data --console-address ":9001"

  #
  # Extension Services
  #

  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        TARGET_PATH: extensions/web
      secrets:
        - github_token
    image: copilot-ld/web:latest
    container_name: web.copilot-ld
    env_file: .env
    environment:
      - EXTENSION_WEB_AUTH_ENABLED=true
    networks:
      internal:
        aliases:
          - web.copilot-ld.local
    depends_on:
      - agent
      - storage

  #
  # Core Services
  #

  agent:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        TARGET_PATH: services/agent
      secrets:
        - github_token
    image: copilot-ld/agent:latest
    container_name: agent.copilot-ld
    env_file: .env
    networks:
      internal:
        aliases:
          - agent.copilot-ld.local
    depends_on:
      - memory
      - llm
      - vector
      - graph
      - tool
      - storage

  memory:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        TARGET_PATH: services/memory
      secrets:
        - github_token
    image: copilot-ld/memory:latest
    container_name: memory.copilot-ld
    env_file: .env
    networks:
      internal:
        aliases:
          - memory.copilot-ld.local
    depends_on:
      - storage

  llm:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        TARGET_PATH: services/llm
      secrets:
        - github_token
    image: copilot-ld/llm:latest
    container_name: llm.copilot-ld
    env_file: .env
    networks:
      internal:
        aliases:
          - llm.copilot-ld.local
    depends_on:
      - storage

  vector:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        TARGET_PATH: services/vector
      secrets:
        - github_token
    image: copilot-ld/vector:latest
    container_name: vector.copilot-ld
    env_file: .env
    networks:
      internal:
        aliases:
          - vector.copilot-ld.local
    depends_on:
      - storage

  graph:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        TARGET_PATH: services/graph
      secrets:
        - github_token
    image: copilot-ld/graph:latest
    container_name: graph.copilot-ld
    env_file: .env
    networks:
      internal:
        aliases:
          - graph.copilot-ld.local
    depends_on:
      - storage

  tool:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        TARGET_PATH: services/tool
      secrets:
        - github_token
    image: copilot-ld/tool:latest
    container_name: tool.copilot-ld
    env_file: .env
    networks:
      internal:
        aliases:
          - tool.copilot-ld.local
    depends_on:
      - storage

  trace:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        TARGET_PATH: services/trace
      secrets:
        - github_token
    image: copilot-ld/trace:latest
    container_name: trace.copilot-ld
    env_file: .env
    networks:
      internal:
        aliases:
          - trace.copilot-ld.local
    depends_on:
      - storage

  #
  # Supabase Infrastructure (Auth + Storage only)
  #

  supabase-db:
    image: supabase/postgres:15.6.1.143
    container_name: supabase-db.copilot-ld
    env_file: .env
    environment:
      POSTGRES_PASSWORD: ${SUPABASE_DB_PASSWORD}
      POSTGRES_DB: postgres
    volumes:
      - supabase_db_data:/var/lib/postgresql/data
    networks:
      internal:
        aliases:
          - supabase-db.copilot-ld.local

  supabase-auth:
    image: supabase/gotrue:v2.164.0
    container_name: supabase-auth.copilot-ld
    env_file: .env
    environment:
      API_EXTERNAL_URL: ${SUPABASE_AUTH_EXTERNAL_URL:-http://localhost:9999}
      GOTRUE_API_HOST: 0.0.0.0
      GOTRUE_API_PORT: 9999
      GOTRUE_SITE_URL: ${SUPABASE_SITE_URL:-http://localhost:3000}
      GOTRUE_URI_ALLOW_LIST: ${SUPABASE_URI_ALLOW_LIST:-}
      GOTRUE_DISABLE_SIGNUP: ${SUPABASE_DISABLE_SIGNUP:-false}

      GOTRUE_JWT_SECRET: ${SUPABASE_JWT_SECRET}
      GOTRUE_JWT_EXP: ${SUPABASE_JWT_EXPIRY:-3600}
      GOTRUE_JWT_AUD: authenticated

      GOTRUE_DB_DRIVER: postgres
      GOTRUE_DB_DATABASE_URL: postgres://postgres:${SUPABASE_DB_PASSWORD}@supabase-db.copilot-ld.local:5432/postgres?search_path=auth

      GOTRUE_EXTERNAL_EMAIL_ENABLED: true
      GOTRUE_MAILER_AUTOCONFIRM: true

      GOTRUE_SMTP_ADMIN_EMAIL: admin@localhost
      GOTRUE_SMTP_HOST: ${SUPABASE_SMTP_HOST:-}
      GOTRUE_SMTP_PORT: ${SUPABASE_SMTP_PORT:-587}
      GOTRUE_SMTP_USER: ${SUPABASE_SMTP_USER:-}
      GOTRUE_SMTP_PASS: ${SUPABASE_SMTP_PASS:-}
      GOTRUE_SMTP_SENDER_NAME: ${SUPABASE_SMTP_SENDER_NAME:-Copilot LD}
    ports:
      - "9999:9999"
    networks:
      internal:
        aliases:
          - supabase-auth.copilot-ld.local
    depends_on:
      - supabase-db

  supabase-storage:
    image: supabase/storage-api:v1.11.13
    container_name: supabase-storage.copilot-ld
    env_file: .env
    environment:
      ANON_KEY: ${SUPABASE_ANON_KEY}
      SERVICE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      PGRST_JWT_SECRET: ${SUPABASE_JWT_SECRET}
      DATABASE_URL: postgres://postgres:${SUPABASE_DB_PASSWORD}@supabase-db.copilot-ld.local:5432/postgres?search_path=storage
      FILE_SIZE_LIMIT: 52428800
      STORAGE_BACKEND: file
      FILE_STORAGE_BACKEND_PATH: /var/lib/storage
      TENANT_ID: stub
      REGION: local
      GLOBAL_S3_BUCKET: stub
      ENABLE_IMAGE_TRANSFORMATION: false
      IS_MULTITENANT: false
      S3_PROTOCOL_ACCESS_KEY_ID: ${SUPABASE_S3_ACCESS_KEY}
      S3_PROTOCOL_ACCESS_KEY_SECRET: ${SUPABASE_S3_SECRET_KEY}
    ports:
      - "5000:5000"
    volumes:
      - supabase_storage_data:/var/lib/storage
    networks:
      internal:
        aliases:
          - supabase-storage.copilot-ld.local
    depends_on:
      - supabase-db
      - supabase-auth

