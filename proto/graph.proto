syntax = "proto3";

import "resource.proto";

package graph;

service Graph {
  rpc QueryByPattern(Pattern) returns (QueryByTextResponse);
  rpc GetOntology(GetOntologyRequest) returns (GetOntologyResponse);
}

message Pattern {
  optional string subject = 1;
  optional string predicate = 2;
  optional string object = 3;
}

message QueryByTextResponse {
  repeated string contents = 1;
}

message GetOntologyRequest {
  // Optional comment field to ensure valid OpenAI function schema
  optional string comment = 1;
}

message GetOntologyResponse {
  string ontology_json = 1; // JSON string containing the ontology data
}
