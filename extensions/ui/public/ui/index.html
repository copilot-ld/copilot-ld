<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Any Web Page – Home</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.classless.min.css"
    />
  </head>

  <body>
    <header>
      <hgroup>
        <h1>Any Web Page</h1>
        <p>This could literally be any web page.</p>
      </hgroup>
      <nav>
        <ul>
          <li><a href="/ui/">Home</a></li>
          <li><a href="/ui/other.html">Other Page</a></li>
          <li><a href="/ui/chat.html">Chat</a></li>
          <li><a href="/ui/login.html">Login</a></li>
        </ul>
      </nav>
    </header>
    <main>
      <h2>Home</h2>
      <p>
        Welcome to the intelligent chat agent. This web interface provides
        access to the conversational AI system.
      </p>
    </main>
    <footer>
      <p>© 2025 Any Web Page</p>
    </footer>
    <script src="/ui/config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <agent-drawer data-name="Agent Walter"></agent-drawer>
    <script type="module">
      import { getAccessToken } from "/ui/auth.js";
      // Wire up auth token callback for the chat drawer
      const drawer = document.querySelector("agent-drawer");
      if (drawer) {
        drawer.getAuthToken = getAccessToken;
      }
    </script>
    <script type="module" src="/ui/libchat/drawer.js"></script>
  </body>
