syntax = "proto3";

package vector;

service Vector {
  rpc QueryByContent(QueryByTextRequest) returns (QueryByTextResponse);
  rpc QueryByDescriptor(QueryByTextRequest) returns (QueryByTextResponse);
}

message Filter {
  optional string limit = 1;
  optional string threshold = 2;
  optional string max_tokens = 3;
  optional string prefix = 4; // Resource URI prefix
  optional string type = 5; // Resource identifier type
}

message QueryByTextRequest {
  string text = 1;
  optional Filter filters = 2;
  optional string github_token = 3;
}

message QueryByTextResponse {
  repeated string contents = 1;
}
